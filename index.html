<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Relatório Fotográfico Ambiental</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-omnivore@0.3.4/leaflet-omnivore.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/exif-js"></script>

<style>
/* Estilos Gerais */
body { font-family: Arial, sans-serif; margin: 20px auto; max-width: 900px; color: #333; }
h2, h3 { color: #006400; }

.header { 
    display: flex; 
    align-items: center; 
    border-bottom: 3px solid #006400; 
    padding-bottom: 15px; 
    margin-bottom: 20px; 
}
.header img { height: 70px; margin-right: 20px; }
.header div { display: flex; flex-direction: column; flex-grow: 1; }
.header h2 { margin: 0; font-size: 24px; display: flex; align-items: center; justify-content: space-between; }

/* Estilo do Contador de Versão */
.version-tag {
    font-size: 11px;
    font-weight: normal;
    color: #888;
    background: #eee;
    padding: 2px 8px;
    border-radius: 10px;
    margin-left: 10px;
}

.header p { margin: 0; font-size: 14px; color: #555; font-weight: bold; }

.form-group { margin-bottom: 15px; }
.form-group label { font-weight: bold; display: block; margin-bottom: 5px; }
.form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
}
.form-inline { display: flex; gap: 15px; }
.form-inline .form-group { flex: 1; }

button { background-color: #006400; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; margin-bottom: 10px; }
button:hover { background-color: #004d00; }

#map-container { position: relative; margin: 20px 0; border: 1px solid #000; }
#map { height: 450px; width: 100%; z-index: 1; }
#mapInset { height: 150px; width: 150px; position: absolute; bottom: 20px; right: 20px; border: 2px solid black; z-index: 1000; background: white; }

.photo { border: 1px solid #ddd; padding: 15px; margin: 15px 0; background: #f9f9f9; border-radius: 5px; }
.photo b { color: #006400; font-size: 16px; }
.photo img { max-width: 100%; height: auto; margin: 10px 0; border: 1px solid #ccc; display: block; }
.photo .loc-info { font-size: 12px; font-weight: bold; padding: 5px; border-radius: 3px; display: inline-block; margin-bottom: 10px; }

.print-only-text { display: none; }

@media print {
    @page { margin: 15mm; size: A4 portrait; }
    body { margin: 0; font-family: "Times New Roman", serif; font-size: 11pt; }
    button, .no-print, .version-tag { display: none !important; }
    .header { border-bottom: 2px solid #000; }
    input, textarea, select { border: none !important; appearance: none; padding: 0 !important; }
    .print-only-text { display: block; white-space: pre-wrap; }
    textarea { display: none; }
    .photo { page-break-inside: avoid; border-top: 1px solid #000; border-radius: 0; background: none; }
}
</style>
</head>

<body>

<div class="header">
    <img src="Logo_ICMBio_2011_Colorida.png" alt="Logo ICMBio">
    <div>
        <h2>
            Relatório Fotográfico Ambiental
            <span class="version-tag">v2.3.1</span>
        </h2>
        <p>Instituto Chico Mendes de Conservação da Biodiversidade</p>
    </div>
</div>

<div class="form-group">
    <label>Servidores participantes da vistoria:</label>
    <textarea id="servidores" rows="3"></textarea>
    <div class="print-only-text" id="print-servidores"></div>
</div>

<div class="form-inline">
    <div class="form-group">
        <label>Data:</label>
        <input type="date" id="data">
    </div>
    <div class="form-group">
        <label>Hora:</label>
        <input type="time" id="hora">
    </div>
    <div class="form-group">
        <label>Unidade de Conservação (UC):</label>
        <select id="uc">
            <option>Reserva Biológica de Una</option>
            <option>Refúgio de Vida Silvestre de Una</option>
            <option>Parque Nacional da Serra das Lontras</option>
        </select>
    </div>
</div>

<div class="form-group">
    <label>Localização / Ponto de Referência:</label>
    <input type="text" id="local">
</div>

<hr>

<h3>Mapa de Localização Fotográfica</h3>
<div id="map-container">
    <div id="map"></div>
    <div id="mapInset"></div>
</div>

<h3>Registro Fotográfico</h3>
<div class="no-print">
    <button onclick="document.getElementById('fileInput').click()">Anexar da Galeria</button>
    <button onclick="document.getElementById('cameraInput').click()" style="background-color: #005580;">📷 Tirar Foto</button>
    
    <input type="file" id="fileInput" multiple accept="image/*" style="display:none" onchange="processarArquivos(this.files, false)">
    <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none" onchange="processarArquivos(this.files, true)">
    
    <p style="font-size:11px; color: #666;">* Fotos da galeria: o sistema utiliza o GPS interno do arquivo (se disponível).</p>
</div>

<div id="photoList"></div>

<div class="no-print">
    <button onclick="imprimirRelatorio()">Gerar Relatório PDF</button>
    <button onclick="exportKMZ()">Exportar KMZ</button>
</div>

<script>
let map = L.map('map').setView([-14.7, -39.3], 10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let insetMap = L.map('mapInset', { zoomControl: false, attributionControl: false });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(insetMap);

let photoMarkersGroup = L.featureGroup().addTo(map);
let insetMarkersGroup = L.featureGroup().addTo(insetMap);

let photosData = [];

// Conversão Decimal para Graus, Minutos e Segundos
function toDMS(deg, lat) {
    let d = Math.floor(Math.abs(deg));
    let m = Math.floor((Math.abs(deg) - d) * 60);
    let s = (((Math.abs(deg) - d) * 60 - m) * 60).toFixed(2);
    let dir = lat ? (deg >= 0 ? 'N' : 'S') : (deg >= 0 ? 'E' : 'W');
    return `${d}°${m}'${s}" ${dir}`;
}

// Conversão EXIF para Decimal
function convertExifToDecimal(dmsArray, ref) {
    if (!dmsArray || dmsArray.length < 3) return null;
    
    const getVal = (val) => {
        if (typeof val === 'object' && val.numerator !== undefined) return val.numerator / val.denominator;
        return Number(val);
    };

    let d = getVal(dmsArray[0]);
    let m = getVal(dmsArray[1]);
    let s = getVal(dmsArray[2]);
    
    let dd = d + (m / 60) + (s / 3600);
    if (ref === "S" || ref === "W") dd *= -1;
    return dd;
}

// Processamento de Arquivos (Assíncrono para garantir estabilidade)
async function processarArquivos(files, isCamera) {
    if (!files || files.length === 0) return;

    for (let file of Array.from(files)) {
        try {
            // 1. Ler Base64 para exibição
            const base64 = await new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.readAsDataURL(file);
            });

            // 2. Ler Binário para EXIF
            const arrayBuffer = await file.arrayBuffer();
            let lat = null, lon = null, origem = "Sem localização";

            try {
                const exifData = EXIF.readFromBinaryFile(arrayBuffer);
                if (exifData && exifData.GPSLatitude) {
                    lat = convertExifToDecimal(exifData.GPSLatitude, exifData.GPSLatitudeRef);
                    lon = convertExifToDecimal(exifData.GPSLongitude, exifData.GPSLongitudeRef);
                    origem = "Metadados do Arquivo";
                }
            } catch (e) { console.warn("Leitura EXIF falhou"); }

            // Se for câmera e não tiver GPS no arquivo, tenta o GPS do navegador
            if (lat === null && isCamera && navigator.geolocation) {
                try {
                    const pos = await new Promise((res, rej) => 
                        navigator.geolocation.getCurrentPosition(res, rej, {timeout: 6000, enableHighAccuracy: true})
                    );
                    lat = pos.coords.latitude;
                    lon = pos.coords.longitude;
                    origem = "GPS Atual do Dispositivo";
                } catch (gpsErr) { console.warn("GPS do dispositivo indisponível"); }
            }

            adicionarFoto(base64, lat, lon, origem);
        } catch (err) {
            console.error(err);
            alert("Erro ao processar imagem.");
        }
    }
    // Limpa os inputs para permitir selecionar a mesma foto novamente se apagada
    document.getElementById('fileInput').value = "";
    document.getElementById('cameraInput').value = "";
}

function adicionarFoto(base64, lat, lon, origem) {
    const id = Date.now() + Math.random();
    photosData.push({ id, base64, lat, lon, origem, caption: "" });
    renderizar();
}

function removerFoto(id) {
    if(confirm("Deseja remover esta fotografia do relatório?")) {
        photosData = photosData.filter(p => p.id !== id);
        renderizar();
    }
}

function renderizar() {
    const list = document.getElementById('photoList');
    list.innerHTML = '';
    photoMarkersGroup.clearLayers();
    insetMarkersGroup.clearLayers();
    let bounds = [];

    photosData.forEach((p, index) => {
        const figNum = index + 1;
        const isLoc = p.lat !== null;
        
        if (isLoc) {
            L.marker([p.lat, p.lon]).addTo(photoMarkersGroup).bindTooltip("Figura " + figNum, {permanent: true, direction: 'top'});
            L.circleMarker([p.lat, p.lon], {radius: 4, color: 'red'}).addTo(insetMarkersGroup);
            bounds.push([p.lat, p.lon]);
        }

        const div = document.createElement("div");
        div.className = "photo";
        div.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <b>Figura ${figNum}</b>
                <button class="no-print" style="background:#c82333; margin:0; padding:5px 10px;" onclick="removerFoto(${p.id})">🗑️ Remover</button>
            </div>
            <img src="${p.base64}">
            <div class="loc-info" style="background: ${isLoc ? '#e8f5e9' : '#ffebee'}; color: ${isLoc ? '#2e7d32' : '#c62828'};">
                📍 Localização: ${isLoc ? toDMS(p.lat, true) + " | " + toDMS(p.lon, false) : "⚠️ LOCALIZAÇÃO NÃO ENCONTRADA NO ARQUIVO"} (${p.origem})
            </div>
            <input type="text" placeholder="Legenda da imagem..." value="${p.caption}" onchange="photosData.find(x=>x.id===${p.id}).caption=this.value">
        `;
        list.appendChild(div);
    });

    if (bounds.length > 0) map.fitBounds(bounds, {padding: [50, 50], maxZoom: 15});
}

function imprimirRelatorio() {
    document.getElementById('print-servidores').innerText = document.getElementById('servidores').value;
    window.print();
}

function exportKMZ() {
    let zip = new JSZip();
    let kml = `<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document>`;
    photosData.forEach((p, i) => {
        if (!p.lat) return;
        let name = `foto${i+1}.jpg`;
        zip.file(name, p.base64.split(',')[1], {base64: true});
        kml += `<Placemark><name>Figura ${i+1}</name><description>${p.caption}</description><Point><coordinates>${p.lon},${p.lat},0</coordinates></Point></Placemark>`;
    });
    kml += `</Document></kml>`;
    zip.file("doc.kml", kml);
    zip.generateAsync({type:"blob"}).then(c => {
        let a = document.createElement("a");
        a.href = URL.createObjectURL(c);
        a.download = "relatorio_ambiental.kmz";
        a.click();
    });
}
</script>
</body>
</html>
