<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Relatório Fotográfico Ambiental - Versão 1.0</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-omnivore@0.3.4/leaflet-omnivore.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>

<!-- EXIF MODERNO -->
<script src="https://cdn.jsdelivr.net/npm/exifr/dist/lite.umd.js"></script>

<style>
body { font-family: Arial; margin:20px auto; max-width:900px;}
h2, h3 { color:#006400;}

.header { display:flex; align-items:center; border-bottom:3px solid #006400; margin-bottom:20px;}
.header img { height:70px; margin-right:20px;}

.form-group { margin-bottom:15px;}
.form-group label { font-weight:bold;}
.form-group input, select, textarea { width:100%; padding:8px;}

.form-inline { display:flex; gap:15px;}

button { background:#006400; color:#fff; padding:10px; border:none;}
button:hover { background:#004d00;}

#map { height:450px;}
#mapInset { height:150px; width:150px; position:absolute; bottom:20px; right:20px; border:2px solid #000;}

.photo { border:1px solid #ccc; padding:10px; margin:10px 0;}

@media print{
button,.no-print{display:none;}
textarea{display:none;}
}
</style>
</head>

<body>

<div class="header">
<img src="Logo_ICMBio_2011_Colorida.png">
<div>
<h2>Relatório Fotográfico Ambiental</h2>
<p>ICMBio</p>
</div>
</div>

<div class="form-group">
<label>Servidores:</label>
<textarea id="servidores"></textarea>
</div>

<div class="form-inline">
<input type="date" id="data">
<input type="time" id="hora">
<select>
<option>Reserva Biológica de Una</option>
<option>Refúgio de Vida Silvestre de Una</option>
<option>Parque Nacional da Serra das Lontras</option>
</select>
</div>

<h3>Mapa</h3>
<div style="position:relative">
<div id="map"></div>
<div id="mapInset"></div>
</div>

<h3>Registro Fotográfico</h3>

<div class="no-print">
<button onclick="abrirGaleria()">Galeria</button>
<button onclick="abrirCamera()">📷 Câmera</button>

<input type="file" id="fileInput" accept="image/jpeg" multiple style="display:none">
<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">
</div>

<div id="photoList"></div>

<button onclick="imprimir()">Gerar PDF</button>

<script>

// MAPA
let map = L.map('map').setView([-14.7,-39.3],10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let photoMarkers = L.featureGroup().addTo(map);

let photosData=[];
let photoCount=0;

// DATA
window.onload=()=>{
let now=new Date();
data.value=now.toISOString().split('T')[0];
hora.value=now.toTimeString().substring(0,5);
};

// DMS
function toDMS(deg,lat){
let d=Math.floor(Math.abs(deg));
let m=Math.floor((Math.abs(deg)-d)*60);
let s=(((Math.abs(deg)-d)*60-m)*60).toFixed(2);
let dir=lat?(deg>=0?'N':'S'):(deg>=0?'E':'W');
return `${d}°${m}'${s}" ${dir}`;
}

// BOTÕES
function abrirGaleria(){fileInput.click();}
function abrirCamera(){cameraInput.click();}

fileInput.onchange=e=>processar(e.target.files,"galeria");
cameraInput.onchange=e=>processar(e.target.files,"camera");

// EXIF MODERNO
async function getCoords(file){
try{
let gps=await exifr.gps(file);
if(gps && gps.latitude){
return {lat:gps.latitude,lon:gps.longitude};
}
return null;
}catch(e){
return null;
}
}

// PROCESSAMENTO
async function processar(files,tipo){

for(const file of files){

let coords=await getCoords(file);

let reader=new FileReader();

reader.onload=e=>{

let base64=e.target.result;

// GALERIA
if(tipo==="galeria"){

if(coords){
render(base64,coords.lat,coords.lon,"EXIF");
}else{
render(base64,null,null,"Sem EXIF na imagem");
}

}

// CAMERA
if(tipo==="camera"){

if(coords){
render(base64,coords.lat,coords.lon,"EXIF câmera");
}else{
navigator.geolocation.getCurrentPosition(
pos=>render(base64,pos.coords.latitude,pos.coords.longitude,"GPS do aparelho"),
()=>render(base64,null,null,"Sem localização")
);
}

}

};

reader.readAsDataURL(file);

}

}

// RENDER
function render(base64,lat,lon,origem){

photoCount++;

let coord="Sem localização";

if(lat && lon){
coord=`${toDMS(lat,true)} | ${toDMS(lon,false)}`;

let m=L.marker([lat,lon]).addTo(photoMarkers);
m.bindTooltip("Figura "+photoCount,{permanent:true});
}

let id=Date.now();

photosData.push({id,lat,lon});

let div=document.createElement("div");
div.className="photo";

div.innerHTML=`
<b>Figura ${photoCount}</b><br>
<img src="${base64}"><br>
📍 ${origem}: ${coord}<br>
<input placeholder="Legenda">
<br>
<button onclick="remover(${id})">Remover</button>
`;

photoList.appendChild(div);
}

// REMOVER
function remover(id){
photosData=photosData.filter(p=>p.id!==id);
location.reload();
}

// PRINT
function imprimir(){
if(photoMarkers.getLayers().length){
map.fitBounds(photoMarkers.getBounds(),{padding:[40,40]});
}
setTimeout(()=>window.print(),800);
}

</script>

</body>
</html>
