<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Relatório Fotográfico Ambiental - Versão 1.1</title>

<link rel="stylesheet" href="leaflet.css" />
<script src="leaflet.js"></script>
<script src="leaflet-omnivore.min.js"></script>
<script src="jszip.min.js"></script>
<script src="exif-js.js"></script>

<!-- MBTiles suporte -->
<script src="sql.js"></script>
<script src="Leaflet.TileLayer.MBTiles.js"></script>

<style>
/* (SEU CSS ORIGINAL MANTIDO) */
body { font-family: Arial, sans-serif; margin: 20px auto; max-width: 900px; color: #333;}
h2, h3 { color: #006400; }
.header { display:flex; align-items:center; border-bottom:3px solid #006400; padding-bottom:15px; margin-bottom:20px;}
.header img { height:70px; margin-right:20px;}
.form-group { margin-bottom:15px;}
.form-group label { font-weight:bold; display:block; margin-bottom:5px;}
.form-group input, select, textarea { width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;}
.form-inline { display:flex; gap:15px;}
.form-inline .form-group { flex:1;}
button { background:#006400; color:#fff; border:none; padding:10px; border-radius:4px; cursor:pointer;}
button:hover { background:#004d00;}
#map-container { position:relative; margin:20px 0; border:1px solid #000;}
#map { height:450px; background:#f0f0f0; }
#mapInset { height:150px; width:150px; position:absolute; bottom:20px; right:20px; border:2px solid black; background:#fff;}
.photo { border:1px solid #ddd; padding:15px; margin:15px 0; background:#f9f9f9;}
.photo img { max-width:100%; margin:10px 0;}
.marker-tooltip { background:#fff; border:1px solid #000; font-weight:bold;}
.print-only-text { display:none;}
@media print {
button, .no-print { display:none !important;}
body { font-family:"Times New Roman"; font-size:11pt;}
textarea { display:none;}
.print-only-text { display:block; white-space:pre-wrap;}
}
.offline-tiles-message {
    position: absolute;
    bottom: 10px;
    left: 10px;
    background: rgba(0,0,0,0.7);
    color: white;
    padding: 5px 10px;
    border-radius: 4px;
    font-size: 12px;
    z-index: 1000;
}
</style>
</head>

<body>

<div class="header">
<img src="Logo_ICMBio_2011_Colorida.png">
<div>
<h2>Relatório Fotográfico Ambiental</h2>
<p>Instituto Chico Mendes de Conservação da Biodiversidade</p>
</div>
</div>

<div class="form-group">
<label>Servidores participantes da vistoria:</label>
<textarea id="servidores"></textarea>
<div class="print-only-text" id="print-servidores"></div>
</div>

<div class="form-inline">
<div class="form-group">
<label>Data:</label>
<input type="date" id="data">
</div>
<div class="form-group">
<label>Hora:</label>
<input type="time" id="hora">
</div>
<div class="form-group">
<label>UC:</label>
<select id="uc">
<option>Reserva Biológica de Una</option>
<option>Refúgio de Vida Silvestre de Una</option>
<option>Parque Nacional da Serra das Lontras</option>
</select>
</div>
</div>

<div class="form-group">
<label>Local:</label>
<input type="text" id="local">
</div>

<h3>Mapa</h3>
<div id="map-container">
<div id="map"></div>
<div id="mapInset"></div>
</div>

<h3>Registro Fotográfico</h3>

<div class="no-print">
<button onclick="abrirCamera()">📷 Tirar Foto</button>
<input type="file" id="cameraInput" accept="image/*" style="display:none">
</div>

<div id="photoList"></div>

<script>

// =======================
// MAPA ONLINE / OFFLINE
// =======================

let map = L.map('map').setView([-14.7,-39.3],10);
let insetMap = L.map('mapInset',{zoomControl:false, attributionControl:false});

// DETECTA INTERNET
function isOnline(){
    return navigator.onLine;
}

// ONLINE (OpenStreetMap)
if(isOnline()){
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
        maxZoom:19
    }).addTo(map);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
    .addTo(insetMap);

}else{
    // OFFLINE - tentar MBTiles
    try{
        let mb = new L.TileLayer.MBTiles('map.mbtiles');
        mb.addTo(map);
        mb.addTo(insetMap);
    }catch(e){
        console.warn("MBTiles não carregado", e);
    }
}

// =======================
// KML
// =======================
try {
    omnivore.kml('UCs_NGI Ilheus.kml').addTo(map);
    omnivore.kml('UCs_NGI Ilheus.kml').addTo(insetMap);
} catch(e) {
    console.warn('Erro KML', e);
}

// =======================
// FOTO / EXIF ROBUSTO
// =======================

let photosData=[];
let photoCount=0;

function abrirCamera(){
    cameraInput.click();
}

// CONVERSÃO EXIF
function convertExifToDecimal(dmsArray, ref){
    if(!dmsArray) return null;
    let d = dmsArray[0];
    let m = dmsArray[1];
    let s = dmsArray[2];
    let dec = d + m/60 + s/3600;
    if(ref==="S"||ref==="W") dec*=-1;
    return dec;
}

// PROCESSAMENTO PRINCIPAL
cameraInput.addEventListener('change', function(e) {

    let files = e.target.files;

    Array.from(files).forEach(file => {

        let reader = new FileReader();

        reader.onload = function(ev){

            let base64 = ev.target.result;

            let img = new Image();

            img.onload = function(){

                let lat=null, lon=null;

                function finalizar(origem){
                    renderizarFotoHtml(base64, lat, lon, origem, file);
                }

                // ✔️ EXIF seguro
                if(typeof EXIF !== "undefined"){
                    try{
                        EXIF.getData(img, function(){

                            let gpsLat = EXIF.getTag(this, "GPSLatitude");
                            let gpsLatRef = EXIF.getTag(this, "GPSLatitudeRef");
                            let gpsLon = EXIF.getTag(this, "GPSLongitude");
                            let gpsLonRef = EXIF.getTag(this, "GPSLongitudeRef");

                            if(gpsLat && gpsLatRef)
                                lat = convertExifToDecimal(gpsLat, gpsLatRef);

                            if(gpsLon && gpsLonRef)
                                lon = convertExifToDecimal(gpsLon, gpsLonRef);

                            if(lat && lon){
                                finalizar("EXIF");
                            }else{
                                usarGeolocalizacao();
                            }

                        });
                    }catch(err){
                        console.error("Erro EXIF", err);
                        usarGeolocalizacao();
                    }
                }else{
                    console.warn("EXIF não carregado");
                    usarGeolocalizacao();
                }

                function usarGeolocalizacao(){
                    if(navigator.geolocation && location.protocol === "https:"){
                        navigator.geolocation.getCurrentPosition(
                            pos=>{
                                lat = pos.coords.latitude;
                                lon = pos.coords.longitude;
                                finalizar("GPS dispositivo");
                            },
                            err=>{
                                console.warn("GPS bloqueado", err);
                                finalizar("Sem localização");
                            }
                        );
                    }else{
                        finalizar("Sem localização");
                    }
                }

            };

            img.src = base64;
        };

        reader.readAsDataURL(file);
    });

});

// RENDER
function renderizarFotoHtml(imagemUrl, lat, lon, origem){

    photoCount++;

    let coord = "Sem localização";

    if(lat && lon){
        coord = lat.toFixed(6)+" , "+lon.toFixed(6);
        L.marker([lat,lon]).addTo(map);
    }

    let div = document.createElement("div");

    div.className="photo";

    div.innerHTML=`
        <b>Figura ${photoCount}</b><br>
        <img src="${imagemUrl}"><br>
        <small>${origem} | ${coord}</small><br>
    `;

    photoList.appendChild(div);
}

</script>

</body>
</html>
