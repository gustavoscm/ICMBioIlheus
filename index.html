<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Relatório Fotográfico Ambiental - Versão 2.0</title>

<link rel="stylesheet" href="leaflet.css" />
<script src="leaflet.js"></script>
<script src="leaflet-omnivore.min.js"></script>
<script src="jszip.min.js"></script>
<script src="exif-js.js"></script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<link rel="manifest" href="manifest.json">

<style>
/* (SEU CSS ORIGINAL MANTIDO) */
body { font-family: Arial; margin:20px auto; max-width:900px;}
#map{height:450px;}
#mapInset{height:150px;width:150px;position:absolute;bottom:20px;right:20px;}
.photo img{max-width:100%;}
</style>
</head>

<body>

<h2>Relatório Fotográfico Ambiental</h2>

<button onclick="abrirCamera()">📷 Tirar Foto</button>
<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">

<div id="map"></div>
<div id="mapInset"></div>

<div id="photoList"></div>

<button onclick="exportPDF()">Exportar PDF</button>
<button onclick="exportKMZ()">Exportar KMZ</button>

<script>

// ================= PWA =================
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}

// ================= MAPA =================
let map = L.map('map').setView([-14.7,-39.3],10);

let tileLayer = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
).addTo(map);

// ================= STORAGE =================
let photosData = JSON.parse(localStorage.getItem("photosData") || "[]");

// ================= FOTO =================
function abrirCamera(){ cameraInput.click(); }

cameraInput.addEventListener('change', function(e){

    Array.from(e.target.files).forEach(file=>{

        let reader = new FileReader();

        reader.onload = function(ev){

            let base64 = ev.target.result;
            let id = Date.now();

            adicionarFoto(base64,id);

            salvarLocal();

            let img = new Image();
            img.onload = function(){

                let lat=null, lon=null;

                function atualizar(){
                    atualizarFoto(id,lat,lon);
                    salvarLocal();
                }

                if(typeof EXIF!=="undefined"){
                    try{
                        EXIF.getData(img,function(){

                            let gpsLat=EXIF.getTag(this,"GPSLatitude");
                            let gpsLatRef=EXIF.getTag(this,"GPSLatitudeRef");
                            let gpsLon=EXIF.getTag(this,"GPSLongitude");
                            let gpsLonRef=EXIF.getTag(this,"GPSLongitudeRef");

                            if(gpsLat && gpsLatRef)
                                lat=gpsLat[0]+gpsLat[1]/60+gpsLat[2]/3600;

                            if(gpsLon && gpsLonRef)
                                lon=gpsLon[0]+gpsLon[1]/60+gpsLon[2]/3600;

                            atualizar();

                        });
                    }catch{
                        atualizar();
                    }
                }else atualizar();

            };

            img.src = base64;
        };

        reader.readAsDataURL(file);
    });

});

// ================= FUNÇÕES =================

function adicionarFoto(img,id){
    photosData.push({id:id,img:img});
    render();
}

function atualizarFoto(id,lat,lon){
    let p = photosData.find(p=>p.id===id);
    if(!p) return;

    p.lat=lat;
    p.lon=lon;

    if(lat && lon){
        L.marker([lat,lon]).addTo(map);
    }
}

function render(){
    photoList.innerHTML="";
    photosData.forEach((p,i)=>{
        photoList.innerHTML+=`
        <div class="photo">
        <b>Figura ${i+1}</b><br>
        <img src="${p.img}">
        </div>`;
    });
}

function salvarLocal(){
    localStorage.setItem("photosData",JSON.stringify(photosData));
}

// ================= PDF =================
function exportPDF(){
    html2pdf().from(document.body).save("relatorio.pdf");
}

// ================= KMZ =================
function exportKMZ(){

    let zip = new JSZip();
    let kml = `<?xml version="1.0" encoding="UTF-8"?>
    <kml xmlns="http://www.opengis.net/kml/2.2"><Document>`;

    photosData.forEach((p,i)=>{
        if(!p.lat || !p.lon) return;

        let imgName = `foto${i}.jpg`;

        let base64Data = p.img.split(',')[1];
        zip.file(imgName, base64Data, {base64:true});

        kml += `
        <Placemark>
            <name>Foto ${i+1}</name>
            <Point><coordinates>${p.lon},${p.lat},0</coordinates></Point>
        </Placemark>`;
    });

    kml += `</Document></kml>`;
    zip.file("doc.kml", kml);

    zip.generateAsync({type:"blob"}).then(content=>{
        let a=document.createElement("a");
        a.href=URL.createObjectURL(content);
        a.download="relatorio.kmz";
        a.click();
    });
}

render();

</script>
</body>
</html>
