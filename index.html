<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Relatório Fotográfico Ambiental - Versão 1.0</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-omnivore@0.3.4/leaflet-omnivore.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/exif-js"></script>

<style>
body { font-family: Arial, sans-serif; margin: 20px auto; max-width: 900px; color: #333;}
h2, h3 { color: #006400; }

.header { display:flex; align-items:center; border-bottom:3px solid #006400; padding-bottom:15px; margin-bottom:20px;}
.header img { height:70px; margin-right:20px;}

.form-group { margin-bottom:15px;}
.form-group label { font-weight:bold; display:block; margin-bottom:5px;}
.form-group input, select, textarea { width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;}

.form-inline { display:flex; gap:15px;}
.form-inline .form-group { flex:1;}

button { background:#006400; color:#fff; border:none; padding:10px; border-radius:4px; cursor:pointer;}
button:hover { background:#004d00;}

#map-container { position:relative; margin:20px 0; border:1px solid #000;}
#map { height:450px;}
#mapInset { height:150px; width:150px; position:absolute; bottom:20px; right:20px; border:2px solid black; background:#fff;}

.photo { border:1px solid #ddd; padding:15px; margin:15px 0; background:#f9f9f9;}
.photo img { max-width:100%; margin:10px 0;}

.marker-tooltip { background:#fff; border:1px solid #000; font-weight:bold;}

.print-only-text { display:none;}

@media print {
button, .no-print { display:none !important;}
body { font-family:"Times New Roman"; font-size:11pt;}
textarea { display:none;}
.print-only-text { display:block; white-space:pre-wrap;}
}
</style>
</head>

<body>

<div class="header">
<img src="Logo_ICMBio_2011_Colorida.png">
<div>
<h2>Relatório Fotográfico Ambiental</h2>
<p>Instituto Chico Mendes de Conservação da Biodiversidade</p>
</div>
</div>

<div class="form-group">
<label>Servidores participantes da vistoria:</label>
<textarea id="servidores"></textarea>
<div class="print-only-text" id="print-servidores"></div>
</div>

<div class="form-inline">
<div class="form-group">
<label>Data:</label>
<input type="date" id="data">
</div>
<div class="form-group">
<label>Hora:</label>
<input type="time" id="hora">
</div>
<div class="form-group">
<label>UC:</label>
<select id="uc">
<option>Reserva Biológica de Una</option>
<option>Refúgio de Vida Silvestre de Una</option>
<option>Parque Nacional da Serra das Lontras</option>
</select>
</div>
</div>

<div class="form-group">
<label>Local:</label>
<input type="text" id="local">
</div>

<h3>Mapa</h3>
<div id="map-container">
<div id="map"></div>
<div id="mapInset"></div>
</div>

<h3>Informações sobre o Processo</h3>

<div class="form-group">
<label>Número do processo:</label>
<input type="text" id="processo">
</div>

<div class="form-group">
<label>Assunto:</label>
<select id="assunto">
<option>Área embargada</option>
<option>Auto de Infração</option>
<option>Autorização Direta</option>
<option>Regularização Fundiária</option>
<option>Denúncia</option>
</select>
</div>

<div class="form-group">
<label>Descrição:</label>
<textarea id="descricao"></textarea>
<div class="print-only-text" id="print-descricao"></div>
</div>

<h3>Registro Fotográfico</h3>

<div class="no-print">
<button onclick="abrirGaleria()">Anexar Arquivo</button>
<button onclick="abrirCamera()">📷 Tirar Foto</button>
<input type="file" id="fileInput" multiple accept="image/*" style="display:none">
<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">
</div>

<div id="photoList"></div>

<div class="no-print">
<button onclick="imprimirRelatorio()">Gerar PDF</button>
<button onclick="exportKMZ()">Exportar KMZ</button>
</div>

<script>

// MAPA
let map = L.map('map').setView([-14.7,-39.3],10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let insetMap = L.map('mapInset',{zoomControl:false, attributionControl:false});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(insetMap);

omnivore.kml('UCs_NGI Ilheus.kml')
.on('ready',function(){ insetMap.fitBounds(this.getBounds()); })
.addTo(insetMap);

omnivore.kml('UCs_NGI Ilheus.kml').addTo(map);

let photoMarkersGroup = L.featureGroup().addTo(map);
let insetMarkersGroup = L.featureGroup().addTo(insetMap);

let photosData=[];
let photoCount=0;

// DATA
window.onload=function(){
let now=new Date();
data.value=now.toISOString().split('T')[0];
hora.value=now.toTimeString().substring(0,5);
};

// GMS
function toDMS(deg,lat){
let d=Math.floor(Math.abs(deg));
let m=Math.floor((Math.abs(deg)-d)*60);
let s=(((Math.abs(deg)-d)*60-m)*60).toFixed(2);
let dir=lat?(deg>=0?'N':'S'):(deg>=0?'E':'W');
return `${d}°${m}'${s}" ${dir}`;
}

function abrirGaleria(){fileInput.click();}
function abrirCamera(){cameraInput.click();}

fileInput.addEventListener('change',e=>processarArquivos(e.target.files,"galeria"));
cameraInput.addEventListener('change',e=>processarArquivos(e.target.files,"camera"));

// CONVERSÃO EXIF
function convertExifToDecimal(dmsArray, ref){
if(!dmsArray || dmsArray.length<3) return null;

function val(x){
return (typeof x==="object" && x!==null && "numerator" in x)
? x.numerator/x.denominator
: Number(x);
}

let d=val(dmsArray[0]);
let m=val(dmsArray[1]);
let s=val(dmsArray[2]);

let dd=d+(m/60)+(s/3600);
if(ref==="S"||ref==="W") dd*=-1;

return dd;
}

// PROCESSAMENTO CORRIGIDO
function processarArquivos(files, origemArquivo){

Array.from(files).forEach(file=>{

let reader=new FileReader();

reader.onload=e=>{

let base64 = e.target.result;

let img = new Image();

img.onload=function(){

EXIF.getData(img,function(){

let lat=convertExifToDecimal(EXIF.getTag(this,"GPSLatitude"),EXIF.getTag(this,"GPSLatitudeRef"));
let lon=convertExifToDecimal(EXIF.getTag(this,"GPSLongitude"),EXIF.getTag(this,"GPSLongitudeRef"));

// GALERIA
if(origemArquivo==="galeria"){

if(lat && lon){
renderizarFotoHtml(base64,lat,lon,"Metadados EXIF");
}else{
renderizarFotoHtml(base64,null,null,"Localização não encontrada nos metadados da imagem");
}

}

// CAMERA
if(origemArquivo==="camera"){

if(lat && lon){
renderizarFotoHtml(base64,lat,lon,"EXIF da câmera");
}else{
navigator.geolocation.getCurrentPosition(
pos=>renderizarFotoHtml(base64,pos.coords.latitude,pos.coords.longitude,"GPS do dispositivo"),
err=>renderizarFotoHtml(base64,null,null,"Sem localização disponível")
);
}

}

});

};

img.src=base64;

};

reader.readAsDataURL(file);

});

fileInput.value='';
cameraInput.value='';
}

// RENDER
function renderizarFotoHtml(base64,lat,lon,origem){

photoCount++;
let id=Date.now()+photoCount;

let coordText="Sem localização";
let marker=null;
let insetMarker=null;

if(lat && lon){

coordText=`${toDMS(lat,true)} | ${toDMS(lon,false)}`;

marker=L.marker([lat,lon]).addTo(photoMarkersGroup);
marker.bindTooltip("Figura "+photoCount,{permanent:true});

insetMarker=L.circleMarker([lat,lon],{radius:4,color:'red'}).addTo(insetMarkersGroup);
}

let obj={id,base64,caption:"",lat,lon,coordText,marker,insetMarker};
photosData.push(obj);

let div=document.createElement("div");
div.className="photo";
div.id="photo-"+id;

div.innerHTML=`
<b>Figura ${photoCount}</b><br>
<img src="${base64}"><br>
<span style="font-size:12px;">📍 ${origem}: ${coordText}</span><br>

<input placeholder="Legenda..." onchange="updateCaption(${id},this.value)">

<br><br>
<button style="background:#8B0000;" onclick="removerFoto(${id})">Remover foto</button>
`;

photoList.appendChild(div);
}

function removerFoto(id){
let i=photosData.findIndex(p=>p.id===id);
if(i===-1) return;

let p=photosData[i];

if(p.marker) photoMarkersGroup.removeLayer(p.marker);
if(p.insetMarker) insetMarkersGroup.removeLayer(p.insetMarker);

photosData.splice(i,1);

let el=document.getElementById("photo-"+id);
if(el) el.remove();
}

function updateCaption(id,val){
let p=photosData.find(p=>p.id===id);
if(p) p.caption=val;
}

// AJUSTE MAPA PDF
function ajustarMapaParaImpressao(){
let coords = photosData.filter(p=>p.lat && p.lon).map(p=>[p.lat,p.lon]);
if(coords.length){
map.fitBounds(coords,{padding:[40,40]});
}
}

function imprimirRelatorio(){
ajustarMapaParaImpressao();
setTimeout(()=>window.print(),800);
}

// KMZ
function exportKMZ(){

let zip=new JSZip();
let kml=`<kml xmlns="http://www.opengis.net/kml/2.2"><Document>`;

photosData.forEach((p,i)=>{
if(!p.lat || !p.lon) return;

let img=`foto${i}.jpg`;
zip.file(img,p.base64.split(',')[1],{base64:true});

kml+=`<Placemark>
<name>Figura ${i+1}</name>
<description><![CDATA[<img src="${img}" width="300"><br>${p.caption}<br>${p.coordText}]]></description>
<Point><coordinates>${p.lon},${p.lat},0</coordinates></Point>
</Placemark>`;
});

kml+=`</Document></kml>`;
zip.file("doc.kml",kml);

zip.generateAsync({type:"blob"}).then(content=>{
let a=document.createElement("a");
a.href=URL.createObjectURL(content);
a.download="relatorio.kmz";
a.click();
});
}

</script>

</body>
</html>
