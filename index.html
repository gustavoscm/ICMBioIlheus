<!-- SOMENTE A FUNÇÃO FOI REESCRITA — resto permanece igual -->

<script>

function processarArquivos(files, origemArquivo){

Array.from(files).forEach(file=>{

// PRIMEIRO: ler EXIF via ArrayBuffer (forma correta)
let readerExif = new FileReader();

readerExif.onload = function(e){

let arrayBuffer = e.target.result;
let exifData = EXIF.readFromBinaryFile(arrayBuffer);

// converter coordenadas
function convertExif(dms, ref){
if(!dms) return null;

let d=dms[0], m=dms[1], s=dms[2];
let dd=d+(m/60)+(s/3600);
if(ref==="S"||ref==="W") dd*=-1;
return dd;
}

let lat = convertExif(exifData.GPSLatitude, exifData.GPSLatitudeRef);
let lon = convertExif(exifData.GPSLongitude, exifData.GPSLongitudeRef);

// SEGUNDO: ler imagem (base64)
let readerImg = new FileReader();

readerImg.onload = function(e2){

let base64 = e2.target.result;

// GALERIA
if(origemArquivo==="galeria"){

if(lat && lon){
renderizarFotoHtml(base64,lat,lon,"Metadados EXIF");
}else{
renderizarFotoHtml(base64,null,null,"Localização não encontrada nos metadados da imagem");
}

}

// CAMERA
if(origemArquivo==="camera"){

if(lat && lon){
renderizarFotoHtml(base64,lat,lon,"EXIF da câmera");
}else{
navigator.geolocation.getCurrentPosition(
pos=>renderizarFotoHtml(base64,pos.coords.latitude,pos.coords.longitude,"GPS do dispositivo"),
err=>renderizarFotoHtml(base64,null,null,"Sem localização disponível")
);
}

}

};

readerImg.readAsDataURL(file);

};

readerExif.readAsArrayBuffer(file);

});

fileInput.value='';
cameraInput.value='';
}

</script>
