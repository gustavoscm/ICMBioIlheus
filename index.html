<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Relatório Fotográfico Ambiental</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-omnivore@0.3.4/leaflet-omnivore.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/exif-js"></script>

<style>
/* Estilos Gerais */
body { font-family: Arial, sans-serif; margin: 20px auto; max-width: 900px; color: #333; }
h2, h3 { color: #006400; }
.header { display: flex; align-items: center; border-bottom: 3px solid #006400; padding-bottom: 15px; margin-bottom: 20px; }
.header img { height: 70px; margin-right: 20px; }
.header div { display: flex; flex-direction: column; }
.header h2 { margin: 0; font-size: 24px; }
.header p { margin: 0; font-size: 14px; color: #555; font-weight: bold; }

.form-group { margin-bottom: 15px; }
.form-group label { font-weight: bold; display: block; margin-bottom: 5px; }
.form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
}
.form-inline { display: flex; gap: 15px; }
.form-inline .form-group { flex: 1; }

button { background-color: #006400; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; margin-bottom: 10px; }
button:hover { background-color: #004d00; }

#map-container { position: relative; margin: 20px 0; border: 1px solid #000; }
#map { height: 450px; width: 100%; z-index: 1; }
#mapInset { height: 150px; width: 150px; position: absolute; bottom: 20px; right: 20px; border: 2px solid black; z-index: 1000; background: white; }

.photo { border: 1px solid #ddd; padding: 15px; margin: 15px 0; background: #f9f9f9; border-radius: 5px; }
.photo b { color: #006400; font-size: 16px; }
.photo img { max-width: 100%; height: auto; margin: 10px 0; border: 1px solid #ccc; display: block; }
.photo .loc-info { font-size: 12px; font-weight: bold; padding: 5px; border-radius: 3px; display: inline-block; margin-bottom: 10px; }

.print-only-text { display: none; }

@media print {
    @page { margin: 15mm; size: A4 portrait; }
    body { margin: 0; font-family: "Times New Roman", serif; font-size: 11pt; }
    button, .no-print { display: none !important; }
    .header { border-bottom: 2px solid #000; }
    input, textarea, select { border: none !important; appearance: none; padding: 0 !important; }
    .print-only-text { display: block; white-space: pre-wrap; }
    textarea { display: none; }
    .photo { page-break-inside: avoid; border-top: 1px solid #000; border-radius: 0; background: none; }
}
</style>
</head>

<body>

<div class="header">
    <img src="Logo_ICMBio_2011_Colorida.png" alt="Logo ICMBio">
    <div>
        <h2>Relatório Fotográfico Ambiental</h2>
        <p>Instituto Chico Mendes de Conservação da Biodiversidade</p>
    </div>
</div>

<div class="form-group">
    <label>Servidores participantes da vistoria:</label>
    <textarea id="servidores" rows="3"></textarea>
    <div class="print-only-text" id="print-servidores"></div>
</div>

<div class="form-inline">
    <div class="form-group">
        <label>Data:</label>
        <input type="date" id="data">
    </div>
    <div class="form-group">
        <label>Hora:</label>
        <input type="time" id="hora">
    </div>
    <div class="form-group">
        <label>Unidade de Conservação (UC):</label>
        <select id="uc">
            <option>Reserva Biológica de Una</option>
            <option>Refúgio de Vida Silvestre de Una</option>
            <option>Parque Nacional da Serra das Lontras</option>
        </select>
    </div>
</div>

<div class="form-group">
    <label>Localização / Ponto de Referência:</label>
    <input type="text" id="local">
</div>

<hr>

<h3>Mapa de Localização Fotográfica</h3>
<div id="map-container">
    <div id="map"></div>
    <div id="mapInset"></div>
</div>

<h3>Registro Fotográfico</h3>
<div class="no-print">
    <button onclick="document.getElementById('fileInput').click()">Anexar da Galeria</button>
    <button onclick="document.getElementById('cameraInput').click()" style="background-color: #005580;">📷 Tirar Foto</button>
    
    <input type="file" id="fileInput" multiple accept="image/*" style="display:none" onchange="processarArquivos(this.files, false)">
    <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none" onchange="processarArquivos(this.files, true)">
    
    <p style="font-size:11px; color: #666;">* Fotos da galeria dependem de GPS nos metadados originais do arquivo.</p>
</div>

<div id="photoList"></div>

<div class="no-print">
    <button onclick="imprimirRelatorio()">Gerar Relatório PDF</button>
    <button onclick="exportKMZ()">Exportar KMZ</button>
</div>

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let insetMap = L.map('mapInset', { zoomControl: false, attributionControl: false });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(insetMap);

let photoMarkersGroup = L.featureGroup().addTo(map);
let insetMarkersGroup = L.featureGroup().addTo(insetMap);
